<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    JHP 앱 아이콘 — 금화 + 시계 모티프 ("재획비 타이머")
    메이플스토리 공식 메소/금화 아이콘을 모사하지 않은 독자적 디자인입니다.
    필요 시 색상/모양을 자유롭게 수정해서 사용하세요.
  -->
  <defs>
    <radialGradient id="faceShine" cx="38%" cy="34%" r="65%">
      <stop offset="0%" stop-color="#FFE9A8" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#FFE9A8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFE9A8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 그림자 -->
  <ellipse cx="256" cy="266" rx="210" ry="210" fill="#000000" opacity="0.18"/>

  <!-- 동전 외곽 림 -->
  <circle cx="256" cy="256" r="205" fill="#7C5210"/>

  <!-- 동전 본체 -->
  <circle cx="256" cy="256" r="184" fill="#E8A826"/>
  <circle cx="256" cy="256" r="184" fill="url(#faceShine)"/>

  <!-- 메달 이중 테두리 -->
  <circle cx="256" cy="256" r="147" fill="none" stroke="#FFE296" stroke-width="11" opacity="0.85"/>
  <circle cx="256" cy="256" r="136" fill="none" stroke="#966012" stroke-width="6" opacity="0.7"/>

  <!-- 시계 디스크 -->
  <circle cx="256" cy="256" r="114" fill="#CA8E1C" stroke="#785013" stroke-width="9"/>

  <!-- 시계 눈금 (12/3/6/9) -->
  <g stroke="#5E3A0E" stroke-width="11" stroke-linecap="round">
    <line x1="256" y1="148" x2="256" y2="166"/>
    <line x1="364" y1="256" x2="346" y2="256"/>
    <line x1="256" y1="364" x2="256" y2="346"/>
    <line x1="148" y1="256" x2="166" y2="256"/>
  </g>

  <!-- 시계 바늘 -->
  <g stroke="#42280A" stroke-linecap="round">
    <line x1="256" y1="256" x2="221" y2="186" stroke-width="14"/>
    <line x1="256" y1="256" x2="186" y2="220" stroke-width="17"/>
  </g>
  <circle cx="256" cy="256" r="9" fill="#42280A"/>

  <!-- 반짝임 -->
  <path d="M398,164 L407,189 L432,198 L407,207 L398,232 L389,207 L364,198 L389,189 Z" fill="#FFFFFF" opacity="0.9"/>
  <path d="M422,228 L426,238 L436,242 L426,246 L422,256 L418,246 L408,242 L418,238 Z" fill="#FFFFFF" opacity="0.7"/>
</svg>
